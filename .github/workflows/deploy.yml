name: Deploy React Site

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22 # อัปเดตเป็น Node 22 เพื่อเคลียร์ตัว Warning บรรทตล่าง

      - name: Install dependencies
        run: |
          if [ -f yarn.lock ]; then
            yarn install --frozen-lockfile
          elif [ -f pnpm-lock.yaml ]; then
            corepack enable && pnpm install --frozen-lockfile
          else
            npm install
          fi

      - name: Build
        run: |
          if [ -f yarn.lock ]; then
            yarn build
          elif [ -f pnpm-lock.yaml ]; then
            pnpm build
          else
            npm run build
          fi
        env:
          CI: false

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # หากเช็กในโปรเจกต์แล้วพบว่าเป็น Create React App ให้เปลี่ยนเป็น './build' ครับ

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
